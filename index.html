<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00203E" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Sistema Polímata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>body{display:flex;align-items:center;justify-content:center;height:100vh;background:#F3EEE4;color:#00203E;font-family:Montserrat,sans-serif;text-align:center;}</style>
      <p>JavaScript precisa estar habilitado para usar o Polímata CI.</p>
    </noscript>
    <script>
      // Capture JS errors and show them instead of blank screen
      window.__appErrors = [];
      window.onerror = function(msg, src, line, col, err) {
        window.__appErrors.push(msg + ' (' + src + ':' + line + ')');
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.__appErrors.push('Promise: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
      });
      // If the app doesn't mount within 8s, show error info or reload prompt
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          var errHtml = '';
          if (window.__appErrors.length > 0) {
            errHtml = '<div style="background:#FFF0F0;border:1px solid #FFD0D0;color:#C62828;padding:12px 16px;border-radius:8px;font-size:11px;max-width:500px;word-break:break-all;margin-bottom:16px;text-align:left;">'
              + '<b>Erro detectado:</b><br>' + window.__appErrors.join('<br>') + '</div>';
          }
          root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F3EEE4;font-family:Montserrat,sans-serif;color:#00203E;gap:16px;padding:20px;">'
            + errHtml
            + '<p style="font-size:14px;color:#7A8B9C;">Carregando nova versão...</p>'
            + '<button onclick="location.reload(true)" style="padding:10px 24px;border-radius:8px;border:1px solid #CC915E;background:#CC915E;color:#fff;cursor:pointer;font-family:Montserrat,sans-serif;font-size:13px;">Recarregar</button>'
            + '</div>';
        }
      }, 8000);
    </script>
    <script>
      // Force-unregister any residual service workers and clear old caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) {
            reg.unregister().then(function() {
              console.log('[SW] Unregistered residual service worker:', reg.scope);
            });
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
              console.log('[Cache] Deleted cache:', name);
            });
          });
        }
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
